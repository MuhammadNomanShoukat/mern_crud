<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Brain/neural network -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="url(#grad7)" stroke-width="3"/>
  <!-- Neural nodes -->
  <circle cx="160" cy="120" r="8" fill="url(#grad7)"/>
  <circle cx="200" cy="100" r="8" fill="url(#grad7)"/>
  <circle cx="240" cy="120" r="8" fill="url(#grad7)"/>
  <circle cx="160" cy="180" r="8" fill="url(#grad7)"/>
  <circle cx="200" cy="200" r="8" fill="url(#grad7)"/>
  <circle cx="240" cy="180" r="8" fill="url(#grad7)"/>
  <!-- Connections -->
  <line x1="160" y1="120" x2="200" y2="100" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="200" y1="100" x2="240" y2="120" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="160" y1="120" x2="160" y2="180" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="240" y1="120" x2="240" y2="180" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="160" y1="180" x2="200" y2="200" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="200" y1="200" x2="240" y2="180" stroke="url(#grad7)" stroke-width="2"/>
  <line x1="200" y1="100" x2="200" y2="200" stroke="url(#grad7)" stroke-width="2"/>
  <!-- Data points flowing -->
  <circle cx="120" cy="150" r="4" fill="#3b82f6" opacity="0.7"/>
  <circle cx="280" cy="150" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="130" cy="140" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="270" cy="160" r="3" fill="#06b6d4" opacity="0.5"/>
  <!-- Algorithm symbols -->
  <text x="200" y="250" text-anchor="middle" fill="url(#grad7)" font-size="14" font-weight="bold">ML</text>
</svg>