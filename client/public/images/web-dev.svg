<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Monitor -->
  <rect x="50" y="30" width="300" height="180" rx="15" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <!-- Screen -->
  <rect x="60" y="40" width="280" height="160" rx="10" fill="#0f172a" opacity="0.5"/>
  <!-- Code lines -->
  <line x1="80" y1="70" x2="180" y2="70" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="80" y1="95" x2="280" y2="95" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="80" y1="120" x2="250" y2="120" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="80" y1="145" x2="200" y2="145" stroke="url(#grad1)" stroke-width="2"/>
  <line x1="80" y1="170" x2="280" y2="170" stroke="url(#grad1)" stroke-width="2"/>
  <!-- Stand -->
  <rect x="150" y="210" width="100" height="15" rx="7" fill="url(#grad1)"/>
  <line x1="175" y1="225" x2="175" y2="250" stroke="url(#grad1)" stroke-width="3"/>
  <line x1="225" y1="225" x2="225" y2="250" stroke="url(#grad1)" stroke-width="3"/>
</svg>