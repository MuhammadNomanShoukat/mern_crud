<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-default" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gear 1 -->
  <circle cx="100" cy="150" r="45" fill="none" stroke="url(#grad-default)" stroke-width="2"/>
  <g stroke="url(#grad-default)" stroke-width="2">
    <line x1="100" y1="105" x2="100" y2="85"/>
    <line x1="145" y1="145" x2="165" y2="145"/>
    <line x1="100" y1="195" x2="100" y2="215"/>
    <line x1="55" y1="150" x2="35" y2="150"/>
  </g>
  <!-- Gear 2 -->
  <circle cx="280" cy="150" r="40" fill="none" stroke="url(#grad-default)" stroke-width="2"/>
  <g stroke="url(#grad-default)" stroke-width="2">
    <line x1="280" y1="110" x2="280" y2="85"/>
    <line x1="320" y1="150" x2="345" y2="150"/>
    <line x1="280" y1="190" x2="280" y2="215"/>
    <line x1="240" y1="150" x2="215" y2="150"/>
  </g>
  <!-- Connection -->
  <line x1="145" y1="150" x2="240" y2="150" stroke="url(#grad-default)" stroke-width="2"/>
</svg>