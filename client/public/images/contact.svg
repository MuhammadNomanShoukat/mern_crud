<svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="450" fill="#f8fafc"/>
  
  <!-- Decorative elements -->
  <circle cx="340" cy="80" r="32" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="60" cy="380" r="38" fill="url(#grad1)" opacity="0.1"/>
  <rect x="30" y="200" width="60" height="60" rx="8" fill="url(#grad1)" opacity="0.04" transform="rotate(45 60 230)"/>
  
  <!-- Main chat/message illustration -->
  <g transform="translate(200, 100)">
    <!-- Chat bubble 1 (left) -->
    <path d="M -80 0 L -20 0 Q -10 0 -10 10 L -10 45 Q -10 55 -20 55 L -50 55 L -60 70 L -50 55 L -80 55 Q -90 55 -90 45 L -90 10 Q -90 0 -80 0" fill="url(#grad1)" opacity="0.2" stroke="url(#grad1)" stroke-width="1.5"/>
    <!-- Chat text -->
    <line x1="-75" y1="15" x2="-30" y2="15" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
    <line x1="-75" y1="28" x2="-40" y2="28" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Chat bubble 2 (right) -->
    <path d="M 80 0 L 20 0 Q 10 0 10 10 L 10 45 Q 10 55 20 55 L 50 55 L 60 70 L 50 55 L 80 55 Q 90 55 90 45 L 90 10 Q 90 0 80 0" fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="1.5"/>
    <!-- Chat text -->
    <line x1="75" y1="15" x2="30" y2="15" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="75" y1="28" x2="40" y2="28" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Main envelope/mail -->
  <g transform="translate(200, 200)">
    <!-- Envelope body -->
    <rect x="-60" y="-20" width="120" height="90" rx="6" fill="white" stroke="url(#grad1)" stroke-width="2.5"/>
    <!-- Envelope flap -->
    <path d="M -60 -20 L 0 25 L 60 -20" fill="url(#grad1)" opacity="0.2" stroke="url(#grad1)" stroke-width="2.5"/>
    <!-- Mail lines -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="-50" y1="15" x2="50" y2="15" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Phone with message -->
  <g transform="translate(80, 300)">
    <!-- Phone body -->
    <rect x="0" y="0" width="35" height="60" rx="5" fill="white" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
    <!-- Screen -->
    <rect x="3" y="4" width="29" height="50" rx="2" fill="url(#grad1)" opacity="0.1"/>
    <!-- Home button -->
    <circle cx="17.5" cy="56" r="2.5" fill="url(#grad1)" opacity="0.6"/>
  </g>
  
  <!-- Send arrow -->
  <g transform="translate(300, 300)">
    <path d="M 0 0 L 20 0 M 20 0 L 15 -6 M 20 0 L 15 6" stroke="url(#grad1)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>