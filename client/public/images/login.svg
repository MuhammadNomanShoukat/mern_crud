<svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="450" fill="#f8fafc"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="35" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="340" cy="380" r="45" fill="url(#grad1)" opacity="0.1"/>
  <polygon points="320,100 350,120 340,150 310,130" fill="url(#grad1)" opacity="0.05"/>
  
  <!-- Main shield/security illustration -->
  <g transform="translate(200, 120)">
    <!-- Shield outline -->
    <path d="M 0 -50 L 50 -30 L 50 20 Q 0 70 0 70 Q 0 70 -50 20 L -50 -30 Z" fill="url(#grad1)" opacity="0.15" stroke="url(#grad1)" stroke-width="2.5"/>
    
    <!-- Inner shield -->
    <path d="M 0 -45 L 45 -28 L 45 18 Q 0 60 0 60 Q 0 60 -45 18 L -45 -28 Z" fill="white" stroke="url(#grad1)" stroke-width="2"/>
    
    <!-- Lock icon inside shield -->
    <g transform="translate(0, 15)">
      <!-- Lock body -->
      <rect x="-16" y="0" width="32" height="30" rx="3" fill="url(#grad1)" opacity="0.2" stroke="url(#grad1)" stroke-width="2"/>
      <!-- Lock shackle -->
      <path d="M -12 0 Q -12 -20 0 -20 Q 12 -20 12 0" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="0" cy="12" r="3" fill="url(#grad1)"/>
    </g>
  </g>
  
  <!-- Key decoration -->
  <g transform="translate(320, 200)">
    <circle cx="0" cy="0" r="10" fill="url(#grad1)" opacity="0.3"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke="url(#grad1)" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <rect x="20" y="-3" width="6" height="6" fill="url(#grad1)" opacity="0.3"/>
  </g>
  
  <!-- Checkmark -->
  <g transform="translate(80, 250)">
    <circle cx="0" cy="0" r="18" fill="#10b981" opacity="0.15"/>
    <path d="M -6 0 L -1 5 L 8 -4" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
  
  <!-- Access granted text -->
  <g transform="translate(200, 380)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="url(#grad1)" font-weight="700" opacity="0.6">Secure Access</text>
  </g>
</svg>