<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Phone -->
  <rect x="100" y="20" width="200" height="260" rx="20" fill="none" stroke="url(#grad3)" stroke-width="3"/>
  <!-- Screen -->
  <rect x="115" y="40" width="170" height="220" rx="15" fill="#0f172a" opacity="0.5"/>
  <!-- Status bar -->
  <line x1="120" y1="60" x2="280" y2="60" stroke="url(#grad3)" stroke-width="2"/>
  <!-- Content -->
  <rect x="130" y="85" width="140" height="50" rx="8" fill="none" stroke="url(#grad3)" stroke-width="2"/>
  <line x1="130" y1="150" x2="270" y2="150" stroke="url(#grad3)" stroke-width="2"/>
  <line x1="130" y1="165" x2="270" y2="165" stroke="url(#grad3)" stroke-width="2"/>
  <line x1="130" y1="180" x2="240" y2="180" stroke="url(#grad3)" stroke-width="2"/>
  <!-- Bottom navigation -->
  <circle cx="145" cy="220" r="12" fill="none" stroke="url(#grad3)" stroke-width="2"/>
  <circle cx="200" cy="220" r="12" fill="none" stroke="url(#grad3)" stroke-width="2"/>
  <circle cx="255" cy="220" r="12" fill="none" stroke="url(#grad3)" stroke-width="2"/>
</svg>