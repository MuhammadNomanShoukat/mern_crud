<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Storefront -->
  <rect x="80" y="120" width="240" height="120" rx="10" fill="none" stroke="url(#grad8)" stroke-width="3"/>
  <!-- Store sign -->
  <rect x="120" y="80" width="160" height="40" rx="5" fill="url(#grad8)" opacity="0.8"/>
  <text x="200" y="105" text-anchor="middle" fill="white" font-size="16" font-weight="bold">STORE</text>
  <!-- Door -->
  <rect x="180" y="160" width="40" height="80" rx="5" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <!-- Windows -->
  <rect x="90" y="130" width="40" height="30" rx="3" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <rect x="270" y="130" width="40" height="30" rx="3" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <!-- Shopping cart -->
  <circle cx="320" cy="220" r="15" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <circle cx="350" cy="220" r="15" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="320" y1="220" x2="350" y2="220" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="335" y1="205" x2="335" y2="235" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="335" y1="205" x2="315" y2="185" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="335" y1="205" x2="355" y2="185" stroke="url(#grad8)" stroke-width="2"/>
  <!-- Shopping bag -->
  <path d="M 50 180 L 80 180 L 75 240 L 55 240 Z" fill="none" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="60" y1="180" x2="60" y2="160" stroke="url(#grad8)" stroke-width="2"/>
  <line x1="55" y1="165" x2="65" y2="165" stroke="url(#grad8)" stroke-width="2"/>
  <!-- Product icons -->
  <rect x="100" y="145" width="15" height="10" rx="2" fill="url(#grad8)" opacity="0.6"/>
  <circle cx="285" cy="145" r="7" fill="url(#grad8)" opacity="0.6"/>
</svg>