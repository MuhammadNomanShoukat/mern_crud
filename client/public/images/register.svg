<svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="450" fill="#f8fafc"/>
  
  <!-- Abstract shapes -->
  <circle cx="350" cy="50" r="30" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="50" cy="400" r="40" fill="url(#grad1)" opacity="0.1"/>
  <rect x="20" y="100" width="80" height="80" rx="10" fill="url(#grad1)" opacity="0.05"/>
  
  <!-- Main rocket illustration -->
  <g transform="translate(200, 150)">
    <!-- Rocket body -->
    <rect x="-25" y="-50" width="50" height="120" rx="15" fill="url(#grad1)"/>
    <rect x="-20" y="-40" width="40" height="100" rx="12" fill="white"/>
    
    <!-- Window -->
    <circle cx="0" cy="-15" r="12" fill="url(#grad1)"/>
    <circle cx="0" cy="-15" r="9" fill="white"/>
    <circle cx="-3" cy="-18" r="2" fill="url(#grad1)"/>
    <circle cx="3" cy="-18" r="2" fill="url(#grad1)"/>
    
    <!-- Door lines -->
    <line x1="-15" y1="10" x2="15" y2="10" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
    <line x1="-15" y1="25" x2="15" y2="25" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Left fin -->
    <path d="M -25 30 L -45 60 L -25 50 Z" fill="url(#grad1)" opacity="0.8"/>
    
    <!-- Right fin -->
    <path d="M 25 30 L 45 60 L 25 50 Z" fill="url(#grad1)" opacity="0.8"/>
    
    <!-- Flames -->
    <path d="M -15 60 L -20 100 L -10 80 Z" fill="#ec4899" opacity="0.6"/>
    <path d="M -5 60 L 0 95 L 5 75 Z" fill="#ec4899" opacity="0.7"/>
    <path d="M 5 60 L 10 100 L 15 80 Z" fill="#ec4899" opacity="0.6"/>
  </g>
  
  <!-- Stars decoration -->
  <g fill="url(#grad1)" opacity="0.2">
    <circle cx="80" cy="60" r="3"/>
    <circle cx="320" cy="120" r="2.5"/>
    <circle cx="70" cy="280" r="2"/>
    <circle cx="340" cy="350" r="3"/>
  </g>
  
  <!-- Growth arrow -->
  <g transform="translate(100, 300)">
    <path d="M 0 30 L 0 5 M 0 5 L -8 13 M 0 5 L 8 13" stroke="url(#grad1)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <text x="20" y="25" font-size="12" fill="url(#grad1)" font-weight="600" opacity="0.7">Growth</text>
  </g>
</svg>